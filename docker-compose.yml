version: '3.8'

services:
  db:
    image: ankane/pgvector:v0.5.1 # pgvectorが組み込まれたPostgreSQLイメージ
    container_name: zax-db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: zax
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data:
