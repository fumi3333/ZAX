name: Monthly Database Backup

on:
  schedule:
    # 毎月1日 09:00 JST (= 00:00 UTC) に実行
    - cron: '0 0 1 * *'
  # 手動実行も可能
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Create backup
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          DATE=$(date +%Y%m%d_%H%M%S)
          pg_dump "$DATABASE_URL" --no-owner --no-acl > "backup_${DATE}.sql"
          gzip "backup_${DATE}.sql"
          echo "BACKUP_FILE=backup_${DATE}.sql.gz" >> $GITHUB_ENV

      - name: Upload backup as artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_number }}
          path: backup_*.sql.gz
          retention-days: 90
